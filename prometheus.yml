---
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Menghubungkan Prometheus dengan mesin Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Memuat file aturan (rules)
rule_files:
  - "/etc/prometheus/alert.rules"
  - "rules.yml"

scrape_configs:
  - job_name: 'prometheus_internal'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'drm_uptime_monitor'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://node_videotron_a
          - http://node_videotron_b
          - http://server_operator
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  # Simulasi videotron menggunakan Node Exporter
  # Ganti targets dengan IP asli videotron kalau sudah ada
  - job_name: videotron
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          instance: "Videotron-01"
          location: "Tunjungan Plaza"

    # Tambahkan entry baru untuk tiap videotron baru
    # - targets:
    #     - 192.168.1.102:9100
    #   labels:
    #     instance: "Videotron-02"
    #     location: "Galaxy Mall"
