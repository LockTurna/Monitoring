name: Videotron Monitoring CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # ============================================
  # JOB 1: Validasi semua file config (YAML)
  # ============================================
  validate:
    name: Validate Config Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate docker-compose.yml
        run: yamllint docker-compose.yml

      - name: Validate prometheus.yml
        run: yamllint prometheus.yml

      - name: Validate alertmanager.yml
        run: yamllint alertmanager.yml

      - name: Validate loki.yml
        run: yamllint loki.yml

      - name: Validate promtail.yml
        run: yamllint promtail.yml

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Test docker-compose config
        run: docker-compose config

      - name: Notify Telegram - Validasi Sukses
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="✅ *Videotron Monitoring*%0AValidasi config SUKSES!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Notify Telegram - Validasi Gagal
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="❌ *Videotron Monitoring*%0AValidasi config GAGAL!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

  # ============================================
  # JOB 2: Deploy ke server (hanya saat push ke main)
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: validate                # hanya jalan kalau validate sukses
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ ERROR: SERVER_HOST secret tidak ditemukan!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ ERROR: SERVER_USER secret tidak ditemukan!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ ERROR: SERVER_SSH_KEY secret tidak ditemukan!"
            exit 1
          fi
          echo "✅ Semua secrets ditemukan"
          echo "Host: ${{ secrets.SERVER_HOST }}"
          echo "User: ${{ secrets.SERVER_USER }}"

      - name: Notify Telegram - Deploy Dimulai
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="🚀 *Videotron Monitoring*%0ADeploy dimulai...%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          script_stop: true
          script: |
            echo "🚀 Mulai deploy ke environment Windows..."
            
            echo "📡 Checking server connectivity..."
            whoami
            cd \
            
            echo "📁 Navigating to C:\opt\videotron-monitoring..."
            if not exist "C:\opt\videotron-monitoring" mkdir "C:\opt\videotron-monitoring"
            cd /d C:\opt\videotron-monitoring
            
            echo "📥 Pulling latest changes..."
            git pull origin master
            
            echo "🐳 Pulling Docker images..."
            docker compose pull
            
            echo "🔄 Starting services..."
            docker compose up -d --force-recreate
            
            echo "✅ Checking service status..."
            docker compose ps
            
            echo "🎉 Deploy completed!"

      - name: Notify Telegram - Deploy Sukses
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="✅ *Videotron Monitoring*%0ADeploy SUKSES!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Notify Telegram - Deploy Gagal
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="❌ *Videotron Monitoring*%0ADeploy GAGAL!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"