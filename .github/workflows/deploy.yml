name: Videotron Monitoring CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # ============================================
  # JOB 1: Validasi semua file config (YAML)
  # ============================================
  validate:
    name: Validate Config Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate docker-compose.yml
        run: yamllint docker-compose.yml

      - name: Validate prometheus.yml
        run: yamllint prometheus.yml

      - name: Validate alertmanager.yml
        run: yamllint alertmanager.yml

      - name: Validate loki.yml
        run: yamllint loki.yml

      - name: Validate promtail.yml
        run: yamllint promtail.yml

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Test docker-compose config
        run: docker-compose config

      - name: Notify Telegram - Validasi Sukses
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="✅ *Videotron Monitoring*%0AValidasi config SUKSES!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Notify Telegram - Validasi Gagal
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="❌ *Videotron Monitoring*%0AValidasi config GAGAL!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

  # ============================================
  # JOB 2: Deploy ke server (hanya saat push ke main)
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: validate                # hanya jalan kalau validate sukses
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ ERROR: SERVER_HOST secret tidak ditemukan!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ ERROR: SERVER_USER secret tidak ditemukan!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ ERROR: SERVER_SSH_KEY secret tidak ditemukan!"
            exit 1
          fi
          echo "✅ Semua secrets ditemukan"
          echo "Host: ${{ secrets.SERVER_HOST }}"
          echo "User: ${{ secrets.SERVER_USER }}"

      - name: Notify Telegram - Deploy Dimulai
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="🚀 *Videotron Monitoring*%0ADeploy dimulai...%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          script_stop: true
          script: |
            set -e
            echo "🚀 Mulai deploy ke server..."
            
            # Cek koneksi
            echo "📡 Checking server connectivity..."
            whoami
            pwd
            
            # Navigate ke folder
            echo "📁 Navigating to /opt/videotron-monitoring..."
            if [ ! -d "/opt/videotron-monitoring" ]; then
              echo "❌ Directory /opt/videotron-monitoring tidak ditemukan!"
              echo "Membuat directory..."
              sudo mkdir -p /opt/videotron-monitoring
              sudo chown $(whoami):$(whoami) /opt/videotron-monitoring
            fi
            
            cd /opt/videotron-monitoring
            
            # Pull latest changes
            echo "📥 Pulling latest changes..."
            git pull origin master || echo "⚠️ Git pull failed, continuing..."
            
            # Pull latest Docker images
            echo "🐳 Pulling Docker images..."
            docker compose pull || true
            
            # Start/restart services
            echo "🔄 Starting services..."
            docker compose up -d --force-recreate
            
            # Check status
            echo "✅ Checking service status..."
            docker compose ps
            
            echo "🎉 Deploy completed!"

      - name: Notify Telegram - Deploy Sukses
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="✅ *Videotron Monitoring*%0ADeploy SUKSES!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"

      - name: Notify Telegram - Deploy Gagal
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=Markdown \
            -d text="❌ *Videotron Monitoring*%0ADeploy GAGAL!%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}"
