groups:
  - name: videotron.rules
    rules:

      # Alert: Videotron mati (tidak ada scrape dalam 1 menit)
      - alert: VideotronDown
        expr: up{job="videotron"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Videotron {{ $labels.instance }} mati"
          description: "Videotron {{ $labels.instance }} tidak dapat dijangkau lebih dari 1 menit."

      # Alert: Videotron uptime rendah dalam 24 jam terakhir
      - alert: VideotronUptimeLow
        expr: avg_over_time(up{job="videotron"}[24h]) * 100 < 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Uptime {{ $labels.instance }} di bawah 95%"
          description: "Uptime {{ $labels.instance }} hanya {{ $value | printf \"%.2f\" }}% dalam 24 jam terakhir."

      # Alert: CPU usage tinggi
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU tinggi di {{ $labels.instance }}"
          description: "CPU usage {{ $labels.instance }} mencapai {{ $value | printf \"%.2f\" }}%."

      # Alert: Memory usage tinggi
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory tinggi di {{ $labels.instance }}"
          description: "Memory usage {{ $labels.instance }} mencapai {{ $value | printf \"%.2f\" }}%."

      # Alert: Disk usage tinggi
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk hampir penuh di {{ $labels.instance }}"
          description: "Disk usage {{ $labels.instance }} mencapai {{ $value | printf \"%.2f\" }}%."
