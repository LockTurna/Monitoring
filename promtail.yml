---
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Log container Docker di monitoring server
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: monitoring-server
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      - json:
          expressions:
            tag: attrs.tag
          source: attrs
      - regex:
          expression: '(?P<container_name>(?:[^|]*))'
          source: tag
      - labels:
          stream:
          container_name:
      - output:
          source: output

  # Log sistem monitoring server
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          host: monitoring-server
          __path__: /var/log/*.log

  # Log dari real device via Docker socket
  - job_name: docker-realdevice
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - target_label: job
        replacement: docker
