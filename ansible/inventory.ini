# Daftar semua server videotron
# Format: [nama_alias] ansible_host=[IP] ansible_user=[user SSH]

[videotron]
vtron-01 ansible_host=192.168.1.101 ansible_user=ubuntu vtron_name="Videotron Tunjungan Plaza"
vtron-02 ansible_host=192.168.1.102 ansible_user=ubuntu vtron_name="Videotron Galaxy Mall"
vtron-03 ansible_host=192.168.1.103 ansible_user=ubuntu vtron_name="Videotron Jalan Raya Darmo"

[monitoring_server]
monitor-01 ansible_host=192.168.1.100 ansible_user=ubuntu

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/id_rsa
